<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KTANE Module Helper</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <header class="module-header">
        <div>
          <p class="eyebrow">Keep Talking and Nobody Explodes</p>
          <h1>Module Helper</h1>
        </div>
        <div class="legend" aria-label="Result legend">
          <span><strong>C</strong> Cut</span>
          <span><strong>D</strong> Do not cut</span>
          <span><strong>S</strong> Cut if serial number is even</span>
          <span><strong>P</strong> Cut if parallel port exists</span>
          <span><strong>B</strong> Cut if 2+ batteries</span>
        </div>
      </header>

      <nav class="module-tabs" aria-label="Module selection">
        <button type="button" data-module-tab="complicated-wires" class="is-selected">Complicated Wires</button>
        <button type="button" data-module-tab="wire-sequences">Wire Sequences</button>
      </nav>

      <section class="wire-panel" id="complicated-wires" data-module-panel aria-labelledby="wire-table-title">
        <div class="panel-title">
          <h2 id="wire-table-title">Complicated Wires</h2>
          <button class="reset-button" type="button" id="resetButton">Reset</button>
        </div>

        <div class="wire-table" role="table" aria-label="Complicated Wires lookup">
          <div class="wire-row table-head" role="row">
            <div role="columnheader">Wire</div>
            <div role="columnheader">Red</div>
            <div role="columnheader">Blue</div>
            <div role="columnheader">Star</div>
            <div role="columnheader">LED</div>
            <div role="columnheader">Result</div>
          </div>

          <div id="wireRows"></div>
        </div>
      </section>

      <section class="wire-panel is-hidden" id="wire-sequences" data-module-panel aria-labelledby="sequence-table-title">
        <div class="panel-title">
          <h2 id="sequence-table-title">Wire Sequences</h2>
          <button class="reset-button" type="button" id="sequenceResetButton">Reset</button>
        </div>

        <div class="wire-table" role="table" aria-label="Wire Sequences lookup">
          <div class="sequence-row table-head" role="row">
            <div role="columnheader">Wire</div>
            <div role="columnheader">Color</div>
            <div role="columnheader">To</div>
            <div role="columnheader">Occurrence</div>
            <div role="columnheader">Result</div>
          </div>

          <div id="sequenceRows"></div>
        </div>
      </section>
    </main>

    <template id="wireRowTemplate">
      <div class="wire-row" role="row">
        <div class="wire-number" role="cell"></div>
        <label class="toggle" role="cell">
          <input type="checkbox" data-prop="red">
          <span>Red</span>
        </label>
        <label class="toggle" role="cell">
          <input type="checkbox" data-prop="blue">
          <span>Blue</span>
        </label>
        <label class="toggle" role="cell">
          <input type="checkbox" data-prop="star">
          <span>Star</span>
        </label>
        <label class="toggle" role="cell">
          <input type="checkbox" data-prop="led">
          <span>LED</span>
        </label>
        <output class="result" role="cell"></output>
      </div>
    </template>

    <template id="sequenceRowTemplate">
      <div class="sequence-row" role="row">
        <div class="wire-number" role="cell"></div>
        <div class="button-group color-buttons" role="cell" aria-label="Wire color">
          <button type="button" data-sequence-color="">None</button>
          <button type="button" data-sequence-color="red">Red</button>
          <button type="button" data-sequence-color="blue">Blue</button>
          <button type="button" data-sequence-color="black">Black</button>
        </div>
        <div class="button-group target-buttons" role="cell" aria-label="Wire destination">
          <button type="button" data-sequence-target="A">A</button>
          <button type="button" data-sequence-target="B">B</button>
          <button type="button" data-sequence-target="C">C</button>
        </div>
        <output class="occurrence" role="cell"></output>
        <output class="sequence-result" role="cell"></output>
      </div>
    </template>

    <script src="script.js"></script>
  </body>
</html>
